name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Core + app + dev only. No LLM keys: tests fall back to the deterministic
      # mock floor, so CI never depends on a provider or network.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[app,dev]"

      - name: Tests
        run: pytest -q

      # Eval-as-CI-gate (Part 11.8): fails the build on a quality regression —
      # extraction F1, citation integrity, and mapping accuracy below threshold.
      - name: Eval gate
        run: python -m regradar.eval.run
